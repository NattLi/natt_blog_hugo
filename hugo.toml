baseURL = 'https://blognew.natt.cc/'
languageCode = 'en-us'
title = 'Natt Blog'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  env = "production"
  title = "Natt Blog"
  description = "A blog about design, life, and technology."
  keywords = ["Blog", "Design", "Life", "Technology"]
  author = "Natt"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = "Hi there 👋"
    Content = "Welcome to my blog. Here I share my thoughts on design, life, and the digital world."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nattli"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
