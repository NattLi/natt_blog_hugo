baseurl = "https://blog.natt.cc/"
title = "Natt Blog"
theme = "hugo-theme-stack"
languageCode = "en-us"
defaultContentLanguage = "en"
hasCJKLanguage = true

[pagination]
    pagerSize = 5

[permalinks]
    post = "/posts/:contentbasename/"

[outputs]
    home = ["HTML", "RSS"]
    page = ["HTML", "JSON"]
    section = ["HTML", "RSS"]

[outputFormats.JSON]
    baseName = "index"
    mediaType = "application/json"

[params]
    mainSections = ["post"]
    rssFullContent = true
    description = "Natt's Blog."
    
    [params.sidebar]
        avatar = "images/eimi-nattblog-full.jpg"
        subtitle = "个人随笔 防止自己痴呆忘记了年轻时的蠢事"

    [params.article]
        toc = true
        readingTime = true

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives", params = { limit = 5 } },
            { type = "categories", params = { limit = 10 } },
            { type = "tag-cloud", params = { limit = 10 } },
        ]
        page = [{ type = "toc" }]

    [params.footer]
        since = 2007
        customText = "不管怎样，脑子还有输入输出的话，就随便记两笔"

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 1
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "/archives/"
        weight = 2
        [menu.main.params]
            icon = "archives"

    [[menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 3
        [menu.main.params]
            icon = "search"

    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"
        weight = 4
        [menu.main.params]
            icon = "user"

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
    [markup.highlight]
        noClasses = false
        style = "dracula"
