baseurl = "https://blognew.natt.cc/"
title = "Natt Blog"
theme = "hugo-theme-stack"
languageCode = "en-us"
defaultContentLanguage = "en"
hasCJKLanguage = true

[pagination]
    pagerSize = 5

[permalinks]
    post = "/posts/:contentbasename/"

[outputs]
    home = ["HTML", "RSS"]
    page = ["HTML", "JSON"]
    section = ["HTML", "RSS"]

[outputFormats.JSON]
    baseName = "index"
    mediaType = "application/json"

[params]
    mainSections = ["post"]
    rssFullContent = true
    description = "A blog about design, life, and technology."
    
    [params.sidebar]
        avatar = ""
        subtitle = "Designer & Life Adventurer"
        emoji = "🎨"

    [params.article]
        toc = true
        readingTime = true

    [params.widgets]
        homepage = [
            { type = "search" },
            { type = "archives", params = { limit = 5 } },
            { type = "categories", params = { limit = 10 } },
            { type = "tag-cloud", params = { limit = 10 } },
        ]
        page = [{ type = "toc" }]

    [params.footer]
        since = 2026
        customText = "Stay hungry, stay foolish."

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 1
        [menu.main.params]
            icon = "home"

    [[menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "/archives/"
        weight = 2
        [menu.main.params]
            icon = "archives"

    [[menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 3
        [menu.main.params]
            icon = "search"

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
    [markup.highlight]
        noClasses = false
        style = "dracula"
