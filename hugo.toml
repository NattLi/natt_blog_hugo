baseurl = "https://blognew.natt.cc/"
title = "Natt Blog"
theme = "hugo-theme-cleanwhite"
languageCode = "en-us"
defaultContentLanguage = "en"
hasCJKLanguage = true

[pagination]
  pagerSize = 5

[permalinks]
  post = "/posts/:contentbasename/"

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[params]
  header_image = "img/home-bg-jeep.jpg"
  SEOTitle = "Natt Blog"
  description = "A blog about design, life, and technology."
  keyword = "Natt, Blog, Design, Technology, Life"
  slogan = "Designer & Life Adventurer"

  image_404 = "img/404-bg.jpg"
  title_404 = "Ops! Page not found :("
  omit_categories = false

  algolia_search = false

  sidebar_about_description = "Designer & Life Adventurer"
  # sidebar_avatar = "" # Add absolute url of avatar image here

  featured_tags = true 
  featured_condition_size = 1 
  
  about_me = true
  last_posts = true

  [[params.additional_menus]]
    title =  "Archives"
    href =  "/archives/"

  [[params.additional_menus]]
    title =  "Search"
    href =  "/search/"

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
